<!DOCTYPE html>
<html>
<head>
  <title>Pack Opening</title>
  <style>
    body { text-align: center; font-family: Arial; background: #111; color: white; }
    button { padding: 10px 20px; font-size: 18px; }
    #result { margin-top: 20px; font-size: 24px; }
  </style>
</head>
<body>

<h1>Open a Pack</h1>
<button onclick="openPack()">Open Pack</button>

<div id="result"></div>

<script>
const blooks = [
  { name: "Common Cat", rarity: "Common", chance: 60 },
  { name: "Dog", rarity: "Uncommon", chance: 25 },
  { name: "Dragon", rarity: "Rare", chance: 10 },
  { name: "Golden Mythic", rarity: "Mythic", chance: 5 }
];

function openPack() {
  let rand = Math.random() * 100;
  let total = 0;

  for (let blook of blooks) {
    total += blook.chance;
    if (rand <= total) {
      document.getElementById("result").innerText =
        `You got: ${blook.name} (${blook.rarity})`;
      break;
    }
  }
}
</script>

</body>
</html>
