<!DOCTYPE html>
<html>
<head>
  <title>Funlet</title>

  <style>
    body {
      font-family: Arial;
      background: linear-gradient(to right, #1e1e2f, #2c2c54);
      color: white;
      text-align: center;
    }

    .box {
      background: #2f2f4f;
      padding: 15px;
      border-radius: 15px;
      margin: 15px auto;
      width: 320px;
      box-shadow: 0 0 15px black;
    }

    .packs {
      display: flex;
      justify-content: center;
      gap: 10px;
    }

    .pack {
      cursor: pointer;
      transition: 0.2s;
    }

    .pack:hover {
      transform: scale(1.1);
    }

    .pack img {
      width: 100px;
      border-radius: 10px;
    }

    #animation {
      font-size: 25px;
      height: 40px;
      margin-top: 10px;
    }

    .Uncommon { color: gray; }
    .Rare { color: blue; }
    .Epic { color: purple; }
    .Legendary { color: orange; }

    .Chroma {
      animation: rainbow 1s infinite;
    }

    .Mystical {
      color: gold;
      font-size: 30px;
      text-shadow: 0 0 15px gold;
    }

    @keyframes rainbow {
      0%{color:red;}25%{color:yellow;}50%{color:green;}75%{color:blue;}100%{color:purple;}
    }

    li {
      background: #444;
      margin: 5px;
      padding: 5px;
      border-radius: 8px;
      list-style: none;
    }

    input {
      padding: 8px;
      border-radius: 8px;
      border: none;
    }
  </style>
</head>

<body>

<h1>🎮 Funlet</h1>

<div class="box">
  <h2>💰 Tokens: <span id="tokens"></span></h2>

  <div class="packs">
    <div class="pack" onclick="openPack('toy')">
      <img src="https://via.placeholder.com/100?text=Toy">
    </div>

    <div class="pack" onclick="openPack('sport')">
      <img src="https://via.placeholder.com/100?text=Sport">
    </div>
  </div>

  <div id="animation"></div>
  <h3 id="result"></h3>
</div>

<div class="box">
  <h3>🎒 Inventory (click to sell)</h3>
  <ul id="items"></ul>
</div>

<div class="box">
  <h3>🏪 Auction House</h3>
  <ul id="auction"></ul>
</div>

<div class="box">
  <h3>💬 Chat</h3>
  <ul id="chat"></ul>
  <input id="chatInput">
  <button onclick="sendMessage()">Send</button>
</div>

<script>
let tokens = 100000;
let inventory = [];
let auction = [];

const packs = {
  toy: {
    Uncommon:["Toy Car"],
    Rare:["Lego"],
    Epic:["Robot"],
    Legendary:["Mega Toy"],
    Chroma:["Rainbow Toy"],
    Mystical:["Golden Toy"]
  },
  sport: {
    Uncommon:["Ball"],
    Rare:["Basketball"],
    Epic:["Gear"],
    Legendary:["Jersey"],
    Chroma:["Neon Ball"],
    Mystical:["Trophy"]
  }
};

function getRarity(){
  let r=Math.random()*100;
  if(r<0.001) return "Mystical";
  if(r<0.02) return "Chroma";
  if(r<0.5) return "Legendary";
  if(r<3) return "Epic";
  if(r<15) return "Rare";
  return "Uncommon";
}

function openPack(type){
  if(tokens<20) return;

  tokens-=20;
  updateTokens();

  let rarity=getRarity();
  let reward=packs[type][rarity][0];

  let anim=document.getElementById("animation");
  let i=0;

  let spin=setInterval(()=>{
    anim.innerText="Opening...";
    i++;
    if(i>10){
      clearInterval(spin);
      anim.innerText=reward;
      anim.className=rarity;

      inventory.push(reward);
      updateInventory();

      document.getElementById("result").innerText=
        "🎉 "+reward+" ["+rarity+"]";

      addChat("SYSTEM","Someone got "+reward+" ["+rarity+"]!");
    }
  },100);
}

function updateTokens(){
  document.getElementById("tokens").innerText=tokens;
}

function updateInventory(){
  let list=document.getElementById("items");
  list.innerHTML="";

  inventory.forEach((item,i)=>{
    let li=document.createElement("li");
    li.innerText=item+" (click to sell)";
    li.onclick=()=>{
      let price=Math.floor(Math.random()*1000)+50;
      auction.push({name:item,price:price,time:20});
      inventory.splice(i,1);
      updateInventory();
      updateAuction();
    };
    list.appendChild(li);
  });
}

function updateAuction(){
  let list=document.getElementById("auction");
  list.innerHTML="";

  auction.forEach((item,i)=>{
    let li=document.createElement("li");
    li.innerText=item.name+" 💰"+item.price+" ⏱️"+item.time;

    li.onclick=()=>{
      if(tokens<item.price) return;

      tokens-=item.price;
      inventory.push(item.name);

      auction.splice(i,1);
      updateTokens();
      updateInventory();
      updateAuction();

      addChat("SYSTEM","You bought "+item.name);
    };

    list.appendChild(li);
  });
}

// countdown
setInterval(()=>{
  auction.forEach(a=>a.time--);
  auction=auction.filter(a=>a.time>0);
  updateAuction();
},1000);

// bots
setInterval(()=>{
  let items=["Golden Toy","Neon Ball","Mega Toy"];
  let item=items[Math.floor(Math.random()*items.length)];
  let price=Math.floor(Math.random()*2000)+50;

  auction.push({name:item,price:price,time:20});
  updateAuction();

  addChat("SYSTEM","New auction: "+item+" 💰"+price);
},4000);

// chat
function sendMessage(){
  let msg=document.getElementById("chatInput").value;
  if(!msg) return;
  addChat("You",msg);
  document.getElementById("chatInput").value="";
}

function addChat(user,msg){
  let li=document.createElement("li");
  li.innerText=user+": "+msg;
  document.getElementById("chat").appendChild(li);
}

// fake chat
setInterval(()=>{
  let names=["Pro","Noob","Trader","Legend"];
  let msgs=["hi","anyone here?","I got legendary!","lol"];

  addChat(names[Math.floor(Math.random()*names.length)],
          msgs[Math.floor(Math.random()*msgs.length)]);
},3000);

updateTokens();
</script>

</body>
</html>
