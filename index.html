<!DOCTYPE html>
<html>
<head>
  <title>Blooket Style Game</title>
  <style>
    body {
      background: radial-gradient(circle, #111, #000);
      color: white;
      font-family: Arial;
      text-align: center;
    }

    h1 { margin-top: 20px; }

    button {
      padding: 10px 20px;
      font-size: 18px;
      border-radius: 10px;
      border: none;
      background: orange;
      cursor: pointer;
      margin: 5px;
    }

    #pack {
      width: 180px;
      margin: 20px;
    }

    .shake {
      animation: shake 0.5s infinite;
    }

    @keyframes shake {
      0% { transform: translate(2px,2px); }
      25% { transform: translate(-2px,-3px); }
      50% { transform: translate(2px,3px); }
      75% { transform: translate(-1px,-2px); }
      100% { transform: translate(2px,2px); }
    }

    #card {
      width: 220px;
      height: 260px;
      margin: auto;
      border-radius: 15px;
      display: none;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      font-size: 22px;
      font-weight: bold;
    }

    .common { background:#444; box-shadow:0 0 10px gray; }
    .uncommon { background:#145214; box-shadow:0 0 15px lime; }
    .rare { background:#00334d; box-shadow:0 0 20px cyan; }
    .epic { background:#2d0033; box-shadow:0 0 25px purple; }
    .legendary { background:#665500; box-shadow:0 0 35px gold; animation: glow 1s infinite alternate; }

    @keyframes glow {
      from { box-shadow: 0 0 20px gold; }
      to { box-shadow: 0 0 50px yellow; }
    }

    #shop, #game {
      display: none;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      pointer-events: none;
    }
  </style>
</head>
<body>

<h1>🎮 Blook Game</h1>

<div id="menu">
  <button onclick="startGame()">Play</button>
</div>

<div id="game">
  <h2>💰 Coins: <span id="coins">100</span></h2>
  <button onclick="goShop()">🛒 Shop</button>
</div>

<div id="shop">
  <h2>🎁 Pack Shop (Cost: 20)</h2>
  <img id="pack" src="https://i.imgur.com/6X12UGC.png">
  <br>
  <button onclick="openPack()">Open Pack</button>
  <br><br>
  <button onclick="back()">⬅ Back</button>
</div>

<div id="card"></div>
<canvas id="confetti"></canvas>

<script>
let coins = 100;

const blooks = [
  { name: "Cat", rarity: "common", chance: 40 },
  { name: "Dog", rarity: "uncommon", chance: 30 },
  { name: "Dragon", rarity: "rare", chance: 15 },
  { name: "Galaxy Owl", rarity: "epic", chance: 10 },
  { name: "Golden King", rarity: "legendary", chance: 5 }
];

function updateCoins() {
  document.getElementById("coins").innerText = coins;
}

function startGame() {
  document.getElementById("menu").style.display = "none";
  document.getElementById("game").style.display = "block";
  updateCoins();
}

function goShop() {
  document.getElementById("game").style.display = "none";
  document.getElementById("shop").style.display = "block";
}

function back() {
  document.getElementById("shop").style.display = "none";
  document.getElementById("game").style.display = "block";
}

function openPack() {
  if (coins < 20) {
    alert("Not enough coins!");
    return;
  }

  coins -= 20;
  updateCoins();

  const pack = document.getElementById("pack");
  const card = document.getElementById("card");

  card.style.display = "none";
  pack.classList.add("shake");

  playSound();

  setTimeout(() => {
    pack.classList.remove("shake");

    let rand = Math.random() * 100;
    let total = 0;
    let result;

    for (let b of blooks) {
      total += b.chance;
      if (rand <= total) {
        result = b;
        break;
      }
    }

    card.style.display = "flex";
    card.className = result.rarity;
    card.innerHTML = result.name + "<br>" + result.rarity.toUpperCase();

    if (result.rarity === "legendary") {
      launchConfetti();
    }

  }, 1500);
}

// SOUND
function playSound() {
  const audio = new Audio("https://www.soundjay.com/buttons/sounds/button-3.mp3");
  audio.play();
}

// CONFETTI
function launchConfetti() {
  const canvas = document.getElementById("confetti");
  const ctx = canvas.getContext("2d");

  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  let pieces = [];

  for (let i = 0; i < 100; i++) {
    pieces.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      dy: Math.random() * 5 + 2
    });
  }

  function update() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    for (let p of pieces) {
      p.y += p.dy;
      ctx.fillRect(p.x, p.y, 5, 5);
    }

    requestAnimationFrame(update);
  }

  update();
}
</script>

</body>
</html>
