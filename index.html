<!DOCTYPE html>
<html>
<head>
  <title>Funlet</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
    }

    h1 {
      margin-top: 10px;
    }

    #topbar {
      background: #1e293b;
      padding: 10px;
      font-size: 20px;
    }

    #packs {
      display: flex;
      justify-content: center;
      margin-top: 30px;
      gap: 20px;
    }

    .pack {
      width: 120px;
      height: 160px;
      background: #334155;
      border-radius: 15px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      transition: 0.2s;
    }

    .pack:hover {
      transform: scale(1.1);
      background: #475569;
    }

    #openArea {
      margin-top: 40px;
    }

    #card {
      width: 200px;
      height: 250px;
      background: #1e293b;
      border-radius: 20px;
      margin: auto;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      transition: 0.3s;
    }

    .Uncommon { background: #6b7280; }
    .Rare { background: #3b82f6; }
    .Epic { background: #a855f7; }
    .Legendary { background: #f59e0b; }
    .Chroma { background: linear-gradient(45deg, red, yellow, green, blue); }
    .Mystical { background: gold; }

    #inventory {
      margin-top: 40px;
    }

    .item {
      display: inline-block;
      padding: 10px;
      margin: 5px;
      border-radius: 10px;
      background: #334155;
    }
  </style>
</head>

<body>

<div id="topbar">
  💰 Tokens: <span id="tokens">100000</span>
</div>

<h1>🎮 Funlet</h1>

<div id="packs">
  <div class="pack" onclick="openPack()">Toy</div>
  <div class="pack" onclick="openPack()">Sport</div>
</div>

<div id="openArea">
  <div id="card">Click a Pack</div>
  <h2 id="result"></h2>
</div>

<div id="inventory">
  <h3>🎒 Inventory</h3>
  <div id="items"></div>
</div>

<script>
let tokens = 100000;
let inventory = [];

function getRarity(){
  let r=Math.random()*100;
  if(r<0.001) return "Mystical";
  if(r<0.02) return "Chroma";
  if(r<0.5) return "Legendary";
  if(r<3) return "Epic";
  if(r<15) return "Rare";
  return "Uncommon";
}

const itemsByRarity = {
  Uncommon:["Toy","Ball"],
  Rare:["Lego","Basketball"],
  Epic:["Robot","Gear"],
  Legendary:["Mega Toy","Jersey"],
  Chroma:["Rainbow Toy"],
  Mystical:["Golden Toy"]
};

function openPack(){
  if(tokens < 20) return;

  tokens -= 20;
  document.getElementById("tokens").innerText = tokens;

  let card = document.getElementById("card");
  card.innerText = "Opening...";
  card.className = "";

  let spins = 0;

  let interval = setInterval(()=>{
    let rarity = getRarity();
    let item = itemsByRarity[rarity][0];

    card.innerText = item;
    card.className = rarity;

    spins++;

    if(spins > 10){
      clearInterval(interval);

      inventory.push(item);

      document.getElementById("result").innerText =
        "🎉 You got " + item + " [" + rarity + "]";

      updateInventory();
    }

  }, 100);
}

function updateInventory(){
  let div = document.getElementById("items");
  div.innerHTML = "";

  inventory.forEach(item=>{
    let d = document.createElement("div");
    d.className = "item";
    d.innerText = item;
    div.appendChild(d);
  });
}
</script>

</body>
</html>
